<div class="radium">
  <div class="frd">
    <span class="hopping">
      <span class="gridd">
        <select class="profile_threads">
          <option value="#" selected="selected" title="Pilih Opsi Action">action</option>
          <option value="follow_threads" title="Follow">Follow</option>
          <option value="like_threads" title="Like">Like</option>
          <option value="comment_threads" title="Comment">Comment</option>
          <option value="biograph" title="edit bio">add bio</option>
          <option value="edit_profile_threads" title="edit profile">add link</option>
          <option value="dm_threads" title="dm person">Dm</option>
        </select>
        <select class="uuids_threads">
          <option value="#" selected="selected" title="Pilih Opsi Grab">grab</option>
          <option value="followers_threads" title="Get Uid Followers">Followers</option>
          <option value="following_threads" title="Get Uid Following">Following</option>
          <option value="likers_threads" title="Get Uid Likers">Likers</option>
        </select>
      </span>
      <span class="gridd">
        <input type="number" class="timer" placeholder="delay" value="10">
        <input type="number" class="_uuid" placeholder="action piro" value="500">
      </span>
      <span class="gridd uid_type">
        <div class="pilihuid">
          <div class="radio radio-info radio-inline">
            <input type="radio" id="public_uid" value="public" name="pilih_uid">
            <label for="public_uid">Public</label>
          </div>
          <div class="radio radio-inline">
            <input type="radio" id="private_uid" value="private" name="pilih_uid">
            <label for="private_uid">Private</label>
          </div>
          <span class="bersei" title="Stop Grab">&#9940;</span>
        </div>
      </span>
      <span class="gridd">
        <textarea class="uid" rows="6" cols="6" placeholder="UID"></textarea>
        <textarea class="comment" rows="6" cols="6" placeholder="COMMENT | LINK"></textarea>
      </span>
      <div class="mlaku">jumlah : <strong class="jumlah">0</strong> | null : <strong class="nuller">0</strong> | sukses : <strong class="sukses">0</strong> | gagal : <strong class="gagal">0</strong>
      </div>
      <span class="gridd inipayloader">
        <div class="mlaku">status payload : <span class="payload"></span>
        </div>
      </span>
      <span class="gridd">
        <button type="button" class="btn_action threads_runner" title="mulai proses">tamper</button>
      </span>
    </span>
    <div class="foot">dibuat dengan cinta <i style="color:red">&#10084;</i> dari pamanbob untuk &#169;NODE</div>
  </div>
</div>
