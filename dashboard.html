<div class="radium">
  <div class="frd">
    <span class="hopping">
      <span class="gridd">
        <select class="jenis">
          <option value="#" selected="selected" title="Pilih Opsi Dom">dom</option>
          <option value="follow_dom" title="Follow dom">Follow dom</option>
          <option value="like_dom" title="Like dom">Like dom</option>
          <option value="comment_dom" title="Comment dom">Comment dom</option>
          <option value="create_dom" title="Create Account">Create Dom</option>
        </select>
        <select class="profile">
          <option value="#" selected="selected" title="Pilih Opsi Action">action</option>
          <option value="bio_link" title="Add Biolink">Add BioLink</option>
          <option value="story_reels" title="Add Story">Add Story</option>
          <option value="follow_post" title="Follow">Follow Api</option>
          <option value="like_post" title="Like">Like Api</option>
          <option value="comment_post" title="Comment">Comment Api</option>
        </select>
        <select class="uuids">
          <option value="#" selected="selected" title="Pilih Opsi Grab">grab</option>
          <option value="followers_uid" title="Get Uid Followers">Followers</option>
          <option value="following_uid" title="Get Uid Following">Following</option>
          <option value="likers_uid" title="Get Uid Likers">Likers</option>
        </select>
      </span>
      <span class="gridd">
        <input type="number" class="timer" placeholder="delay" value="10">
        <input type="number" class="_uuid" placeholder="action piro" value="300">

      <span class="gridd enc">
        <input type="text" class="account_enc" placeholder="password">
      </span>
      <span class="gridd uid_type">
        <div class="pilihuid">
          <div class="radio radio-info radio-inline">
            <input type="radio" id="public_uid" value="public" name="pilih_uid">
            <label for="public_uid"> Public</label>
          </div>
          <div class="radio radio-inline">
            <input type="radio" id="private_uid" value="private" name="pilih_uid">
            <label for="private_uid"> Private</label>
          </div>
          <span class="bersei" title="Stop Grab">&#9940;</span>
        </div>
      </span>
      <span class="gridd">
        <textarea class="uid" rows="6" cols="6" placeholder="uid"></textarea>
        <textarea class="comment" rows="6" cols="6" placeholder="comment"></textarea>
      </span>
      <div class="mlaku"> jumlah : <strong class="jumlah">0</strong> | null : <strong class="nuller">0</strong> | sukses : <strong class="sukses">0</strong> | gagal : <strong class="gagal">0</strong>
      </div>
      <span class="gridd">
        <button type="button" class="btn_action dom_runner" title="mulai proses">tamper</button>
      </span>

    <div class="foot">dibuat dengan cinta <i style="color:red;">&#10084;</i> dari &#169; NODE </div>
